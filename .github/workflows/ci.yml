name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Offline test suites
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install --no-cache-dir -r requirements.txt pytest
      # No API key needed — the Anthropic client is lazily constructed and the
      # auth/DB tests are isolated. (Live test_detector.py is intentionally not
      # run in CI; it requires a real key and is a manual/deploy-time smoke test.)
      - run: pytest test_gate1.py test_gate2.py test_gate3.py -q

  docker:
    name: Build image + Trivy scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t ai-firewall:ci .
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ai-firewall:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
